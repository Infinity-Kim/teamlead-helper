# Yarn 4 (Berry). node-modules линкер вместо PnP:
# PnP ломает резолв peer-зависимостей у Vite-плагинов (@tailwindcss/vite → vite)
# и требует IDE SDK. Для WXT/Vite-стека node-modules — надёжный канон.
nodeLinker: node-modules

# Разрешаем postinstall-скрипты доверенным нативным пакетам
# (esbuild — бандлер WXT/Vite, sharp — обработка иконок auto-icons).
enableScripts: true

nmHoistingLimits: workspaces
